name: Update Apartment Listings

on:
  schedule:
    # 8am EST = 1pm UTC (or 12pm UTC during EDT)
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scraper && npm install

      - name: Run scraper
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: cd scraper && node index.js

      - name: Commit and push updated listings
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/listings.json data/commute-cache.json docs/listings.json
          git diff --cached --quiet || git commit -m "Update apartment listings $(date -u +%Y-%m-%d)"
          git push
